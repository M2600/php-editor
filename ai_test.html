    <script>
        async function callAI(action, params) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = 'AI処理中...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch('/api/ai_assistant.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: action,
                        ...params
                    })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    const extractedCode = extractCodeFromResponse(data.response);
                    resultDiv.innerHTML = `
                        <strong>成功:</strong><br>
                        <div style="margin: 10px 0;">
                            <button onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">抽出されたコード</button>
                            <pre style="display:block; background: #f8f8f8; padding: 10px; border-radius: 4px;"><code>${escapeHtml(extractedCode)}</code></pre>
                        </div>
                        <div style="margin: 10px 0;">
                            <button onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">元の回答</button>
                            <pre style="display:none; background: #f0f0f0; padding: 10px; border-radius: 4px;"><code>${escapeHtml(data.response)}</code></pre>
                        </div>
                    `;
                    resultDiv.className = 'result success';
                } else {
                    resultDiv.innerHTML = '<strong>エラー:</strong><br>' + escapeHtml(data.error);
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.innerHTML = '<strong>ネットワークエラー:</strong><br>' + escapeHtml(error.message);
                resultDiv.className = 'result error';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Extract code from AI response (same as in ai_assistant.js)
        function extractCodeFromResponse(response) {
            // Remove <think> tags and content
            let cleaned = response.replace(/<think>.*?<\/think>/gs, '');
            
            // Extract code blocks (```language ... ```)
            const codeBlockRegex = /```(?:php|javascript|html|css|sql|json)?\s*\n(.*?)\n```/gs;
            const matches = [];
            let match;
            
            while ((match = codeBlockRegex.exec(cleaned)) !== null) {
                matches.push(match[1]);
            }
            
            if (matches.length > 0) {
                return matches.join('\n\n');
            }
            
            // Extract code blocks without language specification
            const simpleCodeBlockRegex = /```\s*\n(.*?)\n```/gs;
            const simpleMatches = [];
            let simpleMatch;
            
            while ((simpleMatch = simpleCodeBlockRegex.exec(cleaned)) !== null) {
                simpleMatches.push(simpleMatch[1]);
            }
            
            if (simpleMatches.length > 0) {
                return simpleMatches.join('\n\n');
            }
            
            // If no code blocks found, clean the response
            cleaned = cleaned.trim();
            
            // Remove common AI explanation patterns
            const patterns = [
                /^.*?以下.*?コード.*?[:：]\s*/s,
                /^.*?修正.*?[:：]\s*/s,
                /^.*?リファクタリング.*?[:：]\s*/s,
                /^.*?提案.*?[:：]\s*/s,
                /^.*?補完.*?[:：]\s*/s,
            ];
            
            patterns.forEach(pattern => {
                cleaned = cleaned.replace(pattern, '');
            });
            
            return cleaned.trim();
        }

        function testSuggestion() {
            const code = document.getElementById('codeInput').value;
            callAI('code_suggestion', {
                code: code,
                cursor_position: { row: 2, column: 0 },
                file_type: 'php'
            });
        }

        function testExplanation() {
            const code = document.getElementById('codeInput').value;
            callAI('code_explanation', {
                code: code,
                selected_code: '',
                file_type: 'php'
            });
        }

        function testRefactor() {
            const code = document.getElementById('codeInput').value;
            callAI('code_refactor', {
                code: code,
                selected_code: '',
                file_type: 'php'
            });
        }

        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '接続テスト中...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch('/api/ai_assistant.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'code_explanation',
                        code: 'echo "Hello World";',
                        selected_code: '',
                        file_type: 'php'
                    })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    resultDiv.innerHTML = '<strong>接続成功:</strong><br>Ollamaサーバーに正常に接続できました。';
                    resultDiv.className = 'result success';
                } else {
                    resultDiv.innerHTML = '<strong>接続失敗:</strong><br>' + escapeHtml(data.error);
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.innerHTML = '<strong>接続エラー:</strong><br>' + escapeHtml(error.message);
                resultDiv.className = 'result error';
            }
        }
    </script>
