<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Ace Editor</title>
    <style>
        @import url("/css/colors.css");

        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            /*overflow: hidden;*/
        }

        header {
            height: 4em;
            background-color: #333;
            color: var(--color-text-alt);
        }

        h1 {
            margin: 0;
        }

        main {
            display: flex;
            height: calc(100vh - 4em);
        }

        a {
            color: var(--color-link-alt);
        }

        .window {
            overflow: hidden;
            background-color: var(--color-bg-alt);
            color: var(--color-text-alt);
            /*border: solid 1px #666;*/
        }


        .window-title {
            font-size: 1em;
            margin: .1em;
            white-space: nowrap;
            overflow: hidden;
        }

        #left-side-bar {
            padding: 0;
            margin: 0;
            width: 15%;
            resize: horizontal;
            display: flex;
            flex-direction: column;
        }

        #explorer-menu {
            padding: 0;
            margin: 0;
            display: flex;
        }

        #explorer-title {
            padding-left: .3em;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #explorer-controls {
            padding: 0;
            padding-right: .3em;
            margin: 0;
            display: flex;
            margin-left: auto;
        }

        .explorer-control-item {
            cursor: pointer;
            margin: 0;
            padding: 0;
            white-space: nowrap;
        }

        .explorer-control-item, .explorer-control-item button {
            background-color: var(--color-bg-alt);
            color: var(--color-text-alt);
            border: solid 1px #666;
            padding: .1em;
            margin: 0;
            cursor: pointer;
            border-radius: .3em;
        }
        .explorer-control-item:hover, .explorer-control-item button:hover {
            background-color: var(--color-bg-active-alt);
        }


        

        .file {
            display: flex;
            cursor: pointer;
            margin: 0;
            padding-left: .5em;
            padding-right: .5em;
            white-space: nowrap;
            overflow: hidden;
        }
        .file:hover {
            background-color: var(--color-bg-active-alt);
        }

        .selected-file {
            background-color: var(--color-bg-active-alt);
        }

        .file-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }



        .file-control {
            cursor: pointer;
            margin: 0;
            margin-left: auto;
            padding-left: .1em;
            padding-right: .1em;
            pointer-events: painted;
            border-radius: 20%;
        }
        .file-control:hover {
            background-color: var(--color-bg-active-active-alt)
        }

        .file-menu {
            min-width: 10em;
            display: flex;
            flex-direction: column;
            position: absolute;
            background-color: var(--color-bg-alt);
            color: var(--color-text-alt);
            border: 1px solid #666;
            padding-top: .4rem;
            padding-bottom: .4rem;
            border-radius: .2rem;
            z-index: 1000;
        }

        .file-menu-item {
            background-color: var(--color-bg-alt);
            color: var(--color-text-alt);
            cursor: pointer;
            margin: 0;
            padding-left: 2em;
            white-space: nowrap;
            border: none;
            text-align: left;
        }
        .file-menu-item:hover {
            background-color: var(--color-bg-active-alt);
        }







        #main-container {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        #main-top-bar {
            padding: 0;
            margin: 0;
            border-bottom: solid 1px #666;
        }

        .top-bar-text {
            margin: 0;
            padding: 0;
            padding-left: .5em;
            padding-right: .5em;
            display: inline-block;
        }
        .top-bar-button {
            background-color: var(--color-bg-alt);
            color: var(--color-text-alt);
            border: solid 1px #666;
            padding: .5em;
            margin: 0;
            cursor: pointer;
        }
        .top-bar-button:hover {
            background-color: var(--color-bg-active-alt);
        }


        #main-body {
            background-color: var(--color-editor-bg);
            height: 85%;
            overflow-y: auto;
            overflow-x: hidden;
            resize: vertical;
        }


        #main-bottom-bar {
            background-color: var(--color-bg-alt);
            padding: 2px;
            margin: 0;
            border-top: solid 1px #666;
            overflow: hidden;
            flex: 1;
        }

        .console {
            color: var(--color-text-alt);
            padding-left: .5em;
            padding-bottom: .2em;
            overflow: hidden;
        }

        .error {
            color: red;
        }

        .warning {
            color: yellow;
        }

        .info {
            color: var(--color-text-alt);
        }

        .success {
            color: lightgreen;
        }

        #editor {
            /*position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;*/
            width: 100%;
            height: 100%;
        }



        .duplicate-dialog {
            position: absolute;
            transform: translate(-50%, -50%);
            background-color: var(--color-bg-alt);
            color: var(--color-text-alt);
            border: 1px solid #666;
            padding: .5rem;
            z-index: 1000;
            top: 50%;
            left: 50%;
        }
        .duplicate-dialog-controls{
            display: flex;
            flex-direction: row-reverse;
            margin-top: .2rem;
        }

        .rename-dialog {
            position: absolute;
            transform: translate(-50%, -50%);
            background-color: var(--color-bg-alt);
            color: var(--color-text-alt);
            border: 1px solid #666;
            padding: .5rem;
            z-index: 1000;
            top: 50%;
            left: 50%;
        }
        .rename-dialog-controls{
            display: flex;
            flex-direction: row-reverse;
            margin-top: .2rem;
        }

        .delete-dialog {
            position: absolute;
            transform: translate(-50%, -50%);
            background-color: var(--color-bg-alt);
            color: var(--color-text-alt);
            border: 1px solid #666;
            padding: .5rem;
            z-index: 1000;
            top: 50%;
            left: 50%;
        }
        .delete-dialog-controls{
            display: flex;
            flex-direction: row-reverse;
            margin-top: .2rem;
        }


    </style>
</head>

<body>

    <header>
        <h1>PHP Editor</h1>
    </header>
    <main>
        <div id="left-side-bar" class="window">
            <div id="explorer">
                <h2 class="window-title">エクスプローラー</h2>
                <div id="explorer-menu">
                    <div id="explorer-title" class="explorer-menu-item">/</div>
                    <div id="explorer-controls" class="explorer-menu-item">
                        <button id="newFile" class="explorer-control-item">新規</button>
                    </div>
                </div>
                <div id="explorer-content"></div>
            </div>
        </div>

        <div id="main-container" class="window">
            <div id="main-top-bar">
                <button id="save-button" class="top-bar-button">保存</button>
                <button id="run-button" class="top-bar-button">実行</button>
                <p class="top-bar-text" id="file-name"></p>
                <a id="filePageUrl" class="top-bar-text" href="" target="_blank"></a>
            </div>
            <div id="main-body">
                <div id="editor"></div>
            </div>
            <div id="main-bottom-bar">
                <div id="log-output" class="console"></div>
            </div>
        </div>

    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.2.0/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.2.0/ext-language_tools.js"></script>
    <script>
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.setFontSize(14);
        editor.setShowPrintMargin(false);
        editor.setReadOnly(true);
        editor.setOptions({
            fontFamily: "monospace",
            enableBasicAutocompletion: true,
            enableSnippets: true,
            enableLiveAutocompletion: true,
            maxLines: Infinity,
        });
        editor.getSession().setMode("ace/mode/php");
        editor.getSession().setUseWrapMode(true);
        editor.getSession().setTabSize(4);
        editor.setValue("");

    </script>

    <script>
        const DEBUG = true;

        var FILENAME;
        var NEWFILEDISABLED = false;
        var DELETEDIALOGDISABLED = false;
        var RENAMEDIALOGDISABLED = false;
        var DUPLICATEDIALOGDISABLED = false;

        function removeMenu() {
            oldMenues = document.getElementsByClassName("file-menu");
            for(let i = 0; i < oldMenues.length; i++){
                oldMenues[i].remove();
                window.removeEventListener("click", removeMenu);
            }
        }


        function fileNameCheck(fileName){
            allowedChars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_.";

            if(fileName.length == 0){
                return false;
            }

            for(let i = 0; i < fileName.length; i++){
                if(allowedChars.indexOf(fileName[i]) == -1){
                    return false;
                }
            }
            return true;
        }


        function fileMenu(parent, path){
            removeMenu();

            window.addEventListener("click", removeMenu);

            let menu = document.createElement("div");
            menu.classList.add("file-menu");
            menu.style.top = parent.offsetTop + "px";
            menu.style.left = parent.offsetLeft + parent.offsetWidth + "px";
            menu.addEventListener("click", (e) => {
                e.stopPropagation();
            });

            parent.appendChild(menu);

            let duplicateButton = document.createElement("button");
            duplicateButton.classList.add("file-menu-item");
            duplicateButton.innerHTML = "複製";
            duplicateButton.addEventListener("click", (e) => {
                e.stopPropagation();
                console.log("Duplicate");
                newPath = duplicateFile(path);
                loadExplorer();
            });

            menu.appendChild(duplicateButton);

            let renameButton = document.createElement("button");
            renameButton.classList.add("file-menu-item");
            renameButton.innerHTML = "名前変更";
            renameButton.addEventListener("click", (e) => {
                e.stopPropagation();
                console.log("rename");
                renameDialog(path);
                removeMenu();
            });

            menu.appendChild(renameButton);

            let deleteButton = document.createElement("button");
            deleteButton.classList.add("file-menu-item");
            deleteButton.style.color = "red";
            deleteButton.innerHTML = "削除";
            deleteButton.addEventListener("click", (e) => {
                e.stopPropagation();
                console.log("delete");
                deleteDialog(path);
                removeMenu();
            });

            menu.appendChild(deleteButton);
        }


        

        async function renameDialog(path){
            if(RENAMEDIALOGDISABLED){
                return;
            }
            RENAMEDIALOGDISABLED = true;

            let dialog = document.createElement("div");
            dialog.classList.add("rename-dialog");

            let func = () => {
                let newName = document.getElementById("new-file-name").value;
                if(!fileNameCheck(newName)){
                    console.error("Invalid file name");
                    return;
                }
                dialog.remove();
                RENAMEDIALOGDISABLED = false;
                renameFile(path, newName);
                loadExplorer();
            }

            let newName = document.createElement("input");
            newName.type = "text";
            newName.id = "new-file-name";
            newName.placeholder = "New name";
            newName.addEventListener("change", () => {
                if(!fileNameCheck(newName.value)){
                    newName.style.borderColor = "red";
                }
                else{
                    newName.style.borderColor = "initial";
                }
            })
            newName.addEventListener("keydown", async (e) => {
                if(e.key == "Enter"){
                    func();
                }
            })
            dialog.appendChild(newName);

            let controls = document.createElement("div");
            controls.classList.add("rename-dialog-controls");
            dialog.appendChild(controls);

            let renameButton = document.createElement("button");
            renameButton.innerHTML = "Rename";
            renameButton.addEventListener("click", func);
            controls.appendChild(renameButton);
            
            let cancelButton = document.createElement("button");
            cancelButton.innerHTML = "Cancel";
            cancelButton.addEventListener("click", () => {
                dialog.remove();
                RENAMEDIALOGDISABLED = false;
            });
            controls.appendChild(cancelButton);

            document.body.appendChild(dialog);
            newName.focus();
        }


        async function deleteDialog(path){
            if(DELETEDIALOGDISABLED){
                return;
            }
            DELETEDIALOGDISABLED = true;

            let dialog = document.createElement("div");
            dialog.classList.add("delete-dialog");

            let message = document.createElement("div");
            message.innerHTML = path + ": 本当に削除しますか？";
            dialog.appendChild(message);

            let controls = document.createElement("div");
            controls.classList.add("delete-dialog-controls");
            dialog.appendChild(controls);

            let deleteButton = document.createElement("button");
            deleteButton.innerHTML = "削除";
            deleteButton.addEventListener("click", async () => {
                console.log("delete");
                dialog.remove();
                DELETEDIALOGDISABLED = false;
                await deleteFile(path);
                loadExplorer();
            });
            controls.appendChild(deleteButton);

            let cancelButton = document.createElement("button");
            cancelButton.innerHTML = "キャンセル";
            cancelButton.addEventListener("click", () => {
                dialog.remove();
                DELETEDIALOGDISABLED = false;
            });
            controls.appendChild(cancelButton);

            document.body.appendChild(dialog);
        }



        async function loadExplorer(){
            let explorerContent = document.getElementById("explorer-content");
            let explorerTitle = document.getElementById("explorer-title");
            await fetch("/api/file_manager.php" ,{
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "list",
                    path: ""
                }),
            }).then(response => response.json())
            .then(data => {
                DEBUG && console.log(data);
                if(data.status == "session_error"){
                    console.error(data.error);
                    window.location.href = "/login.php";
                    return;
                }
                userId = data.id;
                explorerTitle.innerHTML = userId + "/";
                explorerContent.innerHTML = "";
                let files = data.files;
                files.forEach(file => {
                    let fileElement = document.createElement("div");
                    fileElement.id = file;
                    fileElement.classList.add("file");
                    fileElement.addEventListener("click", () => {
                        loadFile(file);
                    });

                    fileName = document.createElement("div");
                    fileName.classList.add("file-name");
                    fileName.innerHTML = file;
                    fileElement.appendChild(fileName);

                    fileControl = document.createElement("div");
                    fileControl.classList.add("file-control");
                    fileControl.innerHTML = "⋮";
                    fileControl.addEventListener("click", (e) => {
                        e.stopPropagation();
                        fileMenu(fileElement, file);
                    });

                    fileElement.appendChild(fileControl);


                    explorerContent.appendChild(fileElement);
                });
                DEBUG && console.log("Explorer loaded");
                
            });
        }


        async function loadFile(path){
            let fileElement = document.getElementById(path);
            let saveButton = document.getElementById("save-button");
            let runButton = document.getElementById("run-button");
            let fileName = document.getElementById("file-name");
            let filePageUrl = document.getElementById("filePageUrl");
            await fetch("/api/file_manager.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "get",
                    path: path
                })
            }).then(response => response.json()).then(data => {
                DEBUG && console.log(data);
                if(data.status == "error"){
                    console.error(data.error);
                    return;
                }
                editor.setValue(data.content);
                editor.setReadOnly(false);
                editor.gotoLine(0);
                DEBUG && console.log("File loaded");
            });
            FILENAME = path;
            fileName.innerHTML = FILENAME;
            filePageUrl.href = "";
            filePageUrl.innerHTML = "File page";
            saveButton.removeEventListener("click", pushSaveButton);
            saveButton.addEventListener("click", pushSaveButton);
            runButton.removeEventListener("click", pushRunButton);
            runButton.addEventListener("click", pushRunButton);
            oldSelectedFile = document.getElementsByClassName("selected-file");
            for(let i = 0; i < oldSelectedFile.length; i++){
                oldSelectedFile[i].classList.remove("selected-file");
            }
            fileElement.classList.add("selected-file");
        }

        async function pushSaveButton(){
            let content = editor.getValue();
            saveFile(FILENAME, content);
            phpSyntaxCheck(FILENAME);
        }

        async function pushRunButton(){
            saveFile(FILENAME, editor.getValue());
            runFile(FILENAME);
        }

        

        async function saveFile(path, content){
            await fetch("/api/file_manager.php", {
                method: "POST",
                headere: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "save",
                    path: path,
                    content: content
                })
            }).then(response => response.json()).then(data => {
                DEBUG && console.log(data);
                if(data.status == "error"){
                    console.error(data.error);
                    return;
                }
                DEBUG && console.log("File saved");
            })
        }


        async function renameFile(path, newPath){
            await fetch("/api/file_manager.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "rename",
                    path: path,
                    newPath: newPath,
                })
            }).then(response => response.json()).then(data => {
                DEBUG && console.log(data);
                if(data.status == "error"){
                    console.error(data.error);
                    return;
                }
                DEBUG && console.log("File renamed");
                newPath = data.newPath;
            })
        }

        async function duplicateFile(path){
            await fetch("/api/file_manager.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "duplicate",
                    path: path,
                })
            }).then(response => response.json()).then(data => {
                DEBUG && console.log(data);
                if(data.status == "error"){
                    console.error(data.error);
                    return;
                }
                DEBUG && console.log("File duplicated");
                newPath = data.newPath;
            })
            return newPath;
        }

        async function deleteFile(path){
            await fetch("/api/file_manager.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "delete",
                    path: path,
                })
            }).then(response => response.json()).then(data => {
                DEBUG && console.log(data);
                if(data.status == "error"){
                    console.error(data.error);
                    return;
                }
                DEBUG && console.log("File deleted");
            })
        }


        async function runFile(path){
            let logOutput = document.getElementById("log-output");
            await fetch("/api/file_manager.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "run",
                    path: path
                })
            }).then(response => response.json()).then(data => {
                DEBUG && console.log(data);
                if(data.status == "error"){
                    console.error(data.error);
                    return;
                }
                DEBUG && console.log("File run");
                logOutput.innerHTML = "";

                if(data.result){
                    console.log("run error: " + data.message);
                }
                else{
                    console.log("run ok");
                }
                data.message.forEach(message => {
                    $categoryStr = message.split(":")[0];
                    if($categoryStr.indexOf("error") > -1){
                        logOutput.innerHTML += "<span class=\"error\">" + message.replaceAll("\n", "<br>") + "</span><br>";
                    }
                    else if($categoryStr.indexOf("Warning") > -1){
                        logOutput.innerHTML += "<span class=\"warning\">" + message.replaceAll("\n", "<br>") + "</span><br>";
                    }
                    else{
                        logOutput.innerHTML += "<span class=\"info\">" + message.replaceAll("\n", "<br>") + "</span><br>";
                    }
                })

                logOutput.scrollTop = logOutput.scrollHeight;
            });
        }



        async function createFile(path){
            ret = "";
            await fetch("/api/file_manager.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "touch",
                    path: path
                })
            }).then(response => response.json()).then(data => {
                DEBUG && console.log(data);
                if(data.status == "error"){
                    console.error(data.error);
                    return;
                }
                DEBUG && console.log("File created");
                ret = data.createdFilePath;
            });
            return ret;
        }




        async function newFileDialog(){
            if(NEWFILEDISABLED){
                return;
            }
            NEWFILEDISABLED = true;

            let dialog = document.createElement("div");
            dialog.style.position = "absolute";
            dialog.style.padding = ".5rem";
            dialog.style.backgroundColor = "var(--color-bg-alt)";
            dialog.style.color = "var(--color-text-alt)";
            dialog.style.border = "1px solid #666";
            dialog.style.top = "50%";
            dialog.style.left = "50%";
            dialog.style.transform = "translate(-50%, -50%)";


            func = () => {
                let fileName = document.getElementById("new-file-name").value;
                if (!fileNameCheck(fileName)) {
                    console.error("Invalid file name");
                    return;
                }
                dialog.remove();
                NEWFILEDISABLED = false;
                createFile(fileName).then(path => {
                    DEBUG && console.log(path);
                    loadExplorer().then(() => {
                        loadFile(path);
                    })
                });
                loadExplorer();
            }

            let newFileName = document.createElement("input");
            newFileName.type = "text";
            newFileName.id = "new-file-name";
            newFileName.placeholder = "File name";
            newFileName.addEventListener("change", () => {
                if(!fileNameCheck(newFileName.value)){
                    newFileName.style.borderColor = "red";
                }
                else{
                    newFileName.style.borderColor = "initial";
                }
            })
            newFileName.addEventListener("keydown", async (e) => {
                if(e.key == "Enter"){
                    func();
                }
            })
            dialog.appendChild(newFileName);


            let controls = document.createElement("div");
            controls.style.display = "flex";
            controls.style.flexDirection = "row-reverse";
            controls.style.marginTop = ".2rem";

            let createButton = document.createElement("button");
            createButton.id = "create-file";
            createButton.innerHTML = "Create";
            createButton.addEventListener("click", func);
            controls.appendChild(createButton);

            let cancelButton = document.createElement("button");
            cancelButton.innerHTML = "Cancel";
            cancelButton.addEventListener("click", () => {
                dialog.remove();
                NEWFILEDISABLED = false;
            });
            controls.appendChild(cancelButton);


            dialog.appendChild(controls);

            document.body.appendChild(dialog);
            newFileName.focus();
            
        }

        async function phpSyntaxCheck(path){
            let logOutput = document.getElementById("log-output");
            await fetch("/api/file_manager.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "syntax_check",
                    path: path
                })
            }).then(response => response.json()).then(data => {
                DEBUG && console.log(data);
                if(data.status == "error"){
                    console.error(data.error);
                    return;
                }

                logOutput.innerHTML = "";
                if(data.result){
                    console.log("syntax error: " + data.message);
                    data.message.forEach(message => {
                        $categoryStr = message.split(":")[0];
                        if($categoryStr.indexOf("error") > -1){
                            logOutput.innerHTML += "<span class=\"error\">" + message.replaceAll("\n", "<br>") + "</span><br>";
                        }
                        else if($categoryStr.indexOf("warning") > -1){
                            logOutput.innerHTML += "<span class=\"warning\">" + message.replaceAll("\n", "<br>") + "</span><br>";
                        }
                        else{
                            logOutput.innerHTML += "<span class=\"info\">" + message.replaceAll("\n", "<br>") + "</span><br>";
                        }
                    });
                }
                else{
                    console.log("syntax ok");
                    logOutput.innerHTML = "<span class=\"success\">No syntax error occurred</span>";
                }
                
                logOutput.scrollTop = logOutput.scrollHeight;
            })
        }

        function phpRun(path){}



        document.getElementById("newFile").addEventListener("click", newFileDialog);

        loadExplorer();
    </script>

</body>

</html>
