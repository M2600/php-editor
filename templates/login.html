<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="media/icon.svg">
    <style>
        @import url("css/colors.css");

        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #222;
            color: #ccc;

            font-family: "sans-serif";
        }

        #login-container {
            padding: 2em;
            width: 300px;
            display: flex;
            align-items: center;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.3);
            background-color: #333;
        }

        #login-form {
            padding: 10px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
        }
        
        #title {
            text-align: center;
            margin-bottom: 1em;
        }

        #id-block {
            width: 100%;
        }
        #password-block {
            width: 100%;
        }

        #message {
            width: 100%;
            margin-bottom: 1em;
        }

        .login-id, .login-pw {
            width: 100%;
            height: 2.5em;
            margin-bottom: 1em;
            box-sizing: border-box;
            border: none;
            border-radius: 5px;
            background-color: #444;
            color: #ccc;
            padding: 0 0.5em;
        }
        .login-submit {
            width: 100%;
            height: 2.5em;
            background-color: #555;
            color: #ccc;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        .login-submit:hover {
            background-color: #666;
        }
        
    </style>
</head>
<body>
    <div id="login-container">
        <div id="login-form">
            <div id="title">
                <h2>PHP editor Login</h2>
            </div>

            <div id="id-block">
                <input id="id" class="login-id" type="text" placeholder="ID" required>
            </div>
            <div id="password-block">
                <input id="pw" class="login-pw" type="password" placeholder="パスワード" required>
            </div>
            <div id="message"></div>
            <button id="submit" class="login-submit">ログイン</button>
        </div>
    </div>
    <script>
        async function loginRequest(){
            let message = document.getElementById("message");
            let id = document.getElementById("id").value;
            let pw = document.getElementById("pw").value;
            if(id == "" || pw == ""){
                message.innerHTML = "IDまたはパスワードが入力されていません";
                return;
            }

            await fetch("api/login.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    id: id,
                    pw: pw,
                })
            }).then(response => response.json()).then(async (data) => {
                console.log(data);
                if(data.status == "success"){
                    message.style.color = "green";
                    message.innerHTML = data.message;
                    //await new Promise(resolve => setTimeout(resolve, 2000));
                    window.location.href = "index.php";
                } else {
                    message.style.color = "red";
                    message.innerHTML = data.message;
                }
            });
            
        }
        document.getElementById("submit").addEventListener("click", function() {
            loginRequest();
        });
        document.getElementById("id").addEventListener("keydown", function(e) {
            if(e.key == "Enter"){
                loginRequest();
            }
        });
        document.getElementById("pw").addEventListener("keydown", function(e) {
            if(e.key == "Enter"){
                loginRequest();
            }
        });

        document.getElementById("id").focus();

    </script>
</body>
</html>
