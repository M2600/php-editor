<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100vh;
            width: 100vw;
            margin: 0;
        }
        #container {
            height: 100%;
            width: 100%;
            display: flex;
        }
        #box1 {
            width: 50%;
            height: 100%;
            overflow: hidden;
            resize: horizontal;
            background-color: green;
        }
        #box2 {
            flex: 1;
            background-color: red;
        }

        

    </style>
</head>
<body>
    <main id="container">
        <div id="box1"></div>
        <div id="box2"></div>
    </main>
</body>
</html>
