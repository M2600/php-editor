<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html {
            height: 100vh;
            width: 100vw;
            margin: 0;
        }
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }
        #container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        #menu {
            flex: 0 0 1.5em;
            background-color: lightblue;
        }
        #box {
            flex: 1;
            height: calc(100% - 1.5em);
            background-color: lightpink;
        }
        #img {
            max-height: 100%; /* 親要素の高さに収まるように制限 */
            max-width: 100%;
        }

        

    </style>
</head>
<body>
    <main id="container">
        <div id="menu"><button>a</button></div>
        <div id="box">
            <img id="img" src="../media/castle.jpeg" alt="icon">
        </div>
    </main>
</body>
</html>
