<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
        }
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }
        #container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: row;
        }
        
        .draggable {
            width: 100px;
            height: 100px;
            background-color: red;
            cursor: move;
            border: 1px solid;
            margin: 5px;

        }


        

    </style>
</head>
<body>
    <main id="container">
        <div id="1" class="draggable">Item1</div>
        <div id="2" class="draggable">Item2</div>
        <div id="3" class="draggable">Item3</div>
        <div id="4" class="draggable">Item4</div>
        <div id="5" class="draggable">Item5</div>
    </main>

    <script>

        document.querySelector(".draggable").draggable = true;

        document.querySelectorAll(".draggable").forEach(item => {
            item.addEventListener("dragstart", (event) => {
                event.dataTransfer.setData("text/plain", event.target.id);
                console.log("dragstart", event.target.id);
            });
        });
        document.querySelectorAll(".draggable").forEach(item => {
            item.addEventListener("dragover", (event) => {
                event.preventDefault();
                console.log("dragover", event.target.id);
            });
        });
        document.querySelectorAll(".draggable").forEach(item => {
            item.addEventListener("drop", (event) => {
                onDrop(event);
            });
        });
        document.querySelectorAll(".draggable").forEach(item => {
            item.addEventListener("dragenter", (event) => {
                event.preventDefault();
                console.log("dragenter", event.target.id);
            });
        });
        document.querySelectorAll(".draggable").forEach(item => {
            item.addEventListener("dragleave", (event) => {
                event.preventDefault();
                console.log("dragleave", event.target.id);
            });
        });
        document.querySelectorAll(".draggable").forEach(item => {
            item.addEventListener("dragend", (event) => {
                event.preventDefault();
                console.log("dragend", event.target.id);
            });
        });


        function onDrop(event) {
            event.preventDefault();
            const id = event.dataTransfer.getData("text/plain");
            const draggableElement = document.getElementById(id);
            const dropzone = event.target;
            console.log("drop", id, dropzone.id);
            dropzone.appendChild(draggableElement);
        }

    </script>
</body>
</html>
