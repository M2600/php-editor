<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>BitArrow Authentication Test</title>
</head>
<body>
	<h1>BitArrow Authentication Test Page</h1>
	<p id="message"></p>
	<button id="authButton">BitArrowで認証する</button>
	<button id="bitarrowLoginButton" style="display:none;">BitArrowログイン</button>

	<script type="module">
		import { BAAuth } from './ba_auth.js';

		const baAuth = new BAAuth();
		
		const params = new URLSearchParams(window.location.search);
		if (params.has('state') && params.has('code')) {
			// コールバックからのリダイレクトを処理	
			console.log('Proceeding with authentication...');
			const response = await baAuth.requestToken();
			const messageElem = document.getElementById('message');
			if (response.status === 'success') {
				messageElem.textContent = '認証成功！ID: ' + response.identifier;
				document.getElementById('authButton').style.display = 'none';
				document.getElementById('bitarrowLoginButton').style.display = 'none';
			}
			else if (response.status === 'not_logged_in') {
				//messageElem.textContent = 'BitArrow未ログイン: ' + response.message;
				messageElem.innerHTML += 'BitArrow上でのログインが確認できませんした。<br>BitArrowにログインしてください。<br>ログインが完了したらポップアップウィンドウを閉じてください。';
				document.getElementById('authButton').style.display = 'none';
				document.getElementById('bitarrowLoginButton').style.display = 'inline';
			} 
			else {
				messageElem.textContent = '認証失敗: ' + response.message;
				document.getElementById('authButton').style.display = 'inline';
				document.getElementById('bitarrowLoginButton').style.display = 'none';
			}

		} 

		// 認証ボタンのクリックイベントリスナーを追加
		document.getElementById('authButton').addEventListener('click', async () => {
			const messageElem = document.getElementById('message');
			messageElem.textContent = '';
			baAuth.authenticate();
		});

		document.getElementById('bitarrowLoginButton').addEventListener('click', async () => {
			await baAuth.openBALogin();
			baAuth.authenticate();
		});
	</script>
</body>
</html>
