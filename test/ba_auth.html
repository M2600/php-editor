<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>BitArrow Authentication Test</title>
</head>
<body>
	<h1>BitArrow Authentication Test Page</h1>
	<p>This page is used to test BitArrow authentication mechanisms.</p>
	<p id="message"></p>
	<button id="authButton">Authenticate with BitArrow</button>

	<script type="module">
		import { BAAuth } from './ba_auth.js';

		const baAuth = new BAAuth();
		
		const params = new URLSearchParams(window.location.search);
		if (params.has('state') && params.has('code')) {
			// コールバックからのリダイレクトを処理	
			console.log('Proceeding with authentication...');
			const response = await baAuth.requestToken();
			const messageElem = document.getElementById('message');
			if (response.status === 'success') {
				messageElem.textContent = 'Authentication successful! Access Identifier: ' + response.identifier;
			}
			else if (response.status === 'not_logged_in') {
				messageElem.textContent = 'Authentication failed: ' + response.message;
				await baAuth.openBALogin();
				console.log('BA login detected');
				baAuth.authenticate();
			} 
			else {
				messageElem.textContent = 'Authentication failed: ' + response.message;
			}

		} 

		// 認証ボタンのクリックイベントリスナーを追加
		document.getElementById('authButton').addEventListener('click', async () => {
			const messageElem = document.getElementById('message');
			messageElem.textContent = '';
			baAuth.authenticate();
		});
	</script>
</body>
</html>
